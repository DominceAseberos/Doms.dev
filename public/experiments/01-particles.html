<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d10; }
</style>
</head>
<body>
<canvas id="c" style="display:block;width:100%;height:100%"></canvas>
<script>
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  let pts = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    pts = Array.from({ length: 90 }, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      vx: (Math.random() - .5) * .7,
      vy: (Math.random() - .5) * .7,
      r: Math.random() * 1.8 + .5
    }));
  }

  window.addEventListener('resize', resize);
  resize();

  function draw() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    ctx.fillStyle = 'rgba(13,13,16,.35)';
    ctx.fillRect(0, 0, c.width, c.height);

    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > c.width) p.vx *= -1;
      if (p.y < 0 || p.y > c.height) p.vy *= -1;
    });

    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
        if (d < 100) {
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = `rgba(125,219,45,${0.3 * (1 - d / 100)})`;
          ctx.lineWidth = .6;
          ctx.stroke();
        }
      }
    }

    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(125,219,45,.85)';
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
</style>
</head>
<body>
<canvas id="c" style="display:block;width:100%;height:100%;image-rendering:pixelated"></canvas>
<script>
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');

  const W = 160, H = 120;
  c.width = W; c.height = H;

  const sz = W * H;
  const A = new Float32Array(sz).fill(1);
  const B = new Float32Array(sz);
  const nA = new Float32Array(sz).fill(1); // Boundary supply
  const nB = new Float32Array(sz);

  // seed center with a small square of B
  for (let j = H/2 - 5; j < H/2 + 5; j++) {
    for (let i = W/2 - 5; i < W/2 + 5; i++) {
      A[i + j * W] = .5;
      B[i + j * W] = .25;
    }
  }

  const dA = 1.0, dB = 0.5, f = 0.055, k = 0.062, dt = 1.0;

  function lap(G, x, y) {
    const i = x + y * W;
    return (G[i - 1] + G[i + 1] + G[i - W] + G[i + W] - 4 * G[i]) * 0.2; // Weighted Laplacian
  }

  const img = ctx.createImageData(W, H);

  function loop() {
    for (let s = 0; s < 10; s++) { // More steps per frame for smooth speed
      for (let y = 1; y < H - 1; y++) {
        for (let x = 1; x < W - 1; x++) {
          const i = x + y * W;
          const a = A[i], b = B[i], abb = a * b * b;
          nA[i] = a + (dA * lap(A, x, y) - abb + f * (1 - a)) * dt;
          nB[i] = b + (dB * lap(B, x, y) + abb - (k + f) * b) * dt;
        }
      }
      A.set(nA); B.set(nB);
    }

    for (let i = 0; i < sz; i++) {
        const v = Math.max(0, Math.min(1, 1 - B[i] * 2.5));
        const idx = i * 4;
        img.data[idx]     = 10 + (1 - v) * 115; // 125
        img.data[idx + 1] = 10 + (1 - v) * 209; // 219
        img.data[idx + 2] = 10 + (1 - v) * 35;  // 45
        img.data[idx + 3] = 255;
    }

    ctx.putImageData(img, 0, 0);
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>

<script>
// ─── Intro drop-in ─────────────────────────────────────────────────────────
const introSeq = [
  ['p20',0,-18],['p19',80,-15],['p18',180,-20],['p17',260,-14],
  ['p0',360,-25],['p1',430,-20],['p2',500,-12],['p3',560,-10],
  ['p4',620,-15],['p5',700,-14],['p6',760,-12],['p7',820,-12],
  ['p8',900,-16],['p9',970,-14],['p10',1060,-18],['p11',1130,-15],
  ['p12',1220,-18],['p13',1290,-15],['p21',1370,-22],['p22',1460,-28],
  ['p23',1530,-22],['p15',1640,-20],['p14',1730,-18],['p16',1870,-24],
];

function introIn(id, dropY) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition = 'none';
  el.style.opacity = '0';
  el.style.transform = `translateY(${dropY}px)`;
  el.getBoundingClientRect();
  el.style.transition = 'opacity 0.3s ease-out, transform 0.35s cubic-bezier(0.22,0.61,0.36,1)';
  el.style.opacity = '1';
  el.style.transform = 'translateY(0px)';
}

// ─── Idle float config (gentle, small) ────────────────────────────────────
const pieces = [
  { id:'p20', fy:1.2, fs:0.55, dx:0.6, ds:0.42, ra:0.25, rs:0.38, ph:0.00 },
  { id:'p19', fy:1.4, fs:0.48, dx:0.8, ds:0.37, ra:0.20, rs:0.31, ph:0.72 },
  { id:'p18', fy:2.0, fs:0.62, dx:1.0, ds:0.50, ra:0.35, rs:0.44, ph:1.40 },
  { id:'p17', fy:1.6, fs:0.57, dx:0.9, ds:0.45, ra:0.28, rs:0.40, ph:2.10 },
  { id:'p0',  fy:1.8, fs:0.44, dx:0.5, ds:0.33, ra:0.18, rs:0.28, ph:0.35 },
  { id:'p1',  fy:1.5, fs:0.51, dx:0.7, ds:0.40, ra:0.22, rs:0.35, ph:1.05 },
  { id:'p2',  fy:1.0, fs:0.47, dx:0.4, ds:0.36, ra:0.15, rs:0.30, ph:1.80 },
  { id:'p3',  fy:1.2, fs:0.53, dx:0.5, ds:0.41, ra:0.20, rs:0.33, ph:2.60 },
  { id:'p4',  fy:1.6, fs:0.60, dx:0.8, ds:0.48, ra:0.30, rs:0.42, ph:3.30 },
  { id:'p5',  fy:1.3, fs:0.67, dx:0.6, ds:0.52, ra:0.22, rs:0.45, ph:0.55 },
  { id:'p6',  fy:1.5, fs:0.58, dx:0.7, ds:0.44, ra:0.25, rs:0.38, ph:1.30 },
  { id:'p7',  fy:1.4, fs:0.63, dx:0.6, ds:0.49, ra:0.20, rs:0.41, ph:2.05 },
  { id:'p8',  fy:2.2, fs:0.42, dx:1.1, ds:0.32, ra:0.30, rs:0.27, ph:0.90 },
  { id:'p9',  fy:2.0, fs:0.46, dx:1.0, ds:0.35, ra:0.28, rs:0.30, ph:1.65 },
  { id:'p10', fy:2.5, fs:0.39, dx:1.2, ds:0.29, ra:0.35, rs:0.25, ph:2.40 },
  { id:'p11', fy:2.2, fs:0.43, dx:1.0, ds:0.33, ra:0.30, rs:0.28, ph:3.20 },
  { id:'p12', fy:2.8, fs:0.36, dx:1.4, ds:0.27, ra:0.40, rs:0.23, ph:0.20 },
  { id:'p13', fy:2.5, fs:0.40, dx:1.2, ds:0.30, ra:0.35, rs:0.26, ph:1.10 },
  { id:'p21', fy:3.0, fs:0.55, dx:1.5, ds:0.42, ra:0.50, rs:0.37, ph:0.65 },
  { id:'p22', fy:3.5, fs:0.62, dx:1.8, ds:0.48, ra:0.60, rs:0.44, ph:1.50 },
  { id:'p23', fy:3.2, fs:0.58, dx:1.6, ds:0.45, ra:0.55, rs:0.40, ph:2.35 },
  { id:'p15', fy:2.8, fs:0.38, dx:1.3, ds:0.28, ra:0.38, rs:0.24, ph:1.85 },
  { id:'p14', fy:3.0, fs:0.41, dx:1.5, ds:0.31, ra:0.42, rs:0.27, ph:2.70 },
  { id:'p16', fy:3.5, fs:0.35, dx:1.7, ds:0.26, ra:0.48, rs:0.22, ph:3.50 },
];

// Build a map for fast lookup
const pieceMap = {};
pieces.forEach(p => pieceMap[p.id] = p);

// ─── Breakout config ───────────────────────────────────────────────────────
// Which pieces can break out, and in which direction they launch
// direction: angle in degrees (0=right, 90=down, 180=left, 270=up)
// dist: how far they fly in SVG px
// breakDur / returnDur: ms for each leg
// minInterval / maxInterval: ms between breakouts
const breakoutDefs = [
  { id:'p22', dir:-55,  dist:160, breakDur:520,  returnDur:700,  minInt:3200,  maxInt:5500  },
  { id:'p23', dir:-30,  dist:130, breakDur:480,  returnDur:680,  minInt:4000,  maxInt:7000  },
  { id:'p16', dir:40,   dist:170, breakDur:560,  returnDur:750,  minInt:3800,  maxInt:6500  },
  { id:'p14', dir:55,   dist:150, breakDur:500,  returnDur:720,  minInt:5000,  maxInt:8500  },
  { id:'p0',  dir:-140, dist:120, breakDur:460,  returnDur:660,  minInt:4500,  maxInt:7500  },
  { id:'p1',  dir:-110, dist:110, breakDur:440,  returnDur:640,  minInt:5500,  maxInt:9000  },
  { id:'p12', dir:150,  dist:140, breakDur:490,  returnDur:700,  minInt:4200,  maxInt:7200  },
  { id:'p10', dir:170,  dist:130, breakDur:470,  returnDur:680,  minInt:6000,  maxInt:9500  },
  { id:'p21', dir:-20,  dist:145, breakDur:510,  returnDur:730,  minInt:3500,  maxInt:6000  },
  { id:'p18', dir:-80,  dist:120, breakDur:450,  returnDur:650,  minInt:5000,  maxInt:8000  },
];

// State: track which pieces are currently broken out
const breakoutState = {}; // id -> { active: bool, bx: number, by: number }
breakoutDefs.forEach(b => { breakoutState[b.id] = { active: false, bx: 0, by: 0 }; });

function rand(min, max) { return min + Math.random() * (max - min); }

function scheduleBreakout(def) {
  const delay = rand(def.minInt, def.maxInt);
  setTimeout(() => triggerBreakout(def), delay);
}

function triggerBreakout(def) {
  const el = document.getElementById(def.id);
  if (!el) return;

  const state = breakoutState[def.id];
  if (state.active) {
    scheduleBreakout(def);
    return;
  }

  // Add some jitter to direction ±15°
  const angle = (def.dir + rand(-15, 15)) * Math.PI / 180;
  const dist  = def.dist * rand(0.85, 1.15);
  const bx    = Math.cos(angle) * dist;
  const by    = Math.sin(angle) * dist;
  // Slight random rotation during flight
  const rot   = rand(-25, 25);

  state.active = true;
  state.bx = bx;
  state.by = by;

  // Phase 1: fly out — use CSS transition, pause rAF override temporarily
  el.dataset.breakRot = rot;
  el.dataset.breakBx  = bx;
  el.dataset.breakBy  = by;
  el.dataset.breaking = '1';

  // Apply breakout transform ON TOP of current idle offset
  const p = pieceMap[def.id];
  const t = (performance.now() - (window._idleStart || 0)) / 1000;
  const { tx: itx, ty: ity } = idleTransform(p, t);

  el.style.transition = `transform ${def.breakDur}ms cubic-bezier(0.25,0.46,0.45,0.94), filter ${def.breakDur}ms ease`;
  el.style.transform  = `translate(${(itx + bx).toFixed(1)}px, ${(ity + by).toFixed(1)}px) rotate(${rot}deg)`;
  el.style.filter     = 'brightness(1.8) drop-shadow(0 0 18px rgba(180,220,255,0.7))';

  // Phase 2: hold briefly at peak, then return
  setTimeout(() => {
    el.style.transition = `transform ${def.returnDur}ms cubic-bezier(0.34,1.3,0.64,1), filter ${def.returnDur}ms ease`;
    el.style.filter     = '';

    // Animate back to idle position
    const t2 = (performance.now() - (window._idleStart || 0)) / 1000;
    const { tx: itx2, ty: ity2 } = idleTransform(p, t2);
    el.style.transform = `translate(${itx2.toFixed(1)}px, ${ity2.toFixed(1)}px) rotate(0deg)`;

    setTimeout(() => {
      // Hand control back to rAF
      el.style.transition = '';
      el.dataset.breaking = '0';
      state.active = false;
      state.bx = 0;
      state.by = 0;

      // Schedule next breakout
      scheduleBreakout(def);
    }, def.returnDur + 80);

  }, def.breakDur + rand(120, 280));
}

// ─── Idle rAF loop ─────────────────────────────────────────────────────────
function idleTransform(p, t) {
  const ph = p.ph;
  const ty = p.fy * (Math.sin(p.fs * t + ph) * 0.65 + Math.sin(p.fs * 1.618 * t + ph + 1.1) * 0.35);
  const tx = p.dx * (Math.cos(p.ds * t + ph + 0.8) * 0.6 + Math.cos(p.ds * 2.414 * t + ph + 2.3) * 0.4);
  const rot = p.ra * Math.sin(p.rs * t + ph + 0.4);
  return { tx, ty, rot };
}

let idleRunning = false;

function idleLoop(ts) {
  if (!idleRunning) return;
  if (!window._idleStart) window._idleStart = ts;
  const t = (ts - window._idleStart) / 1000;

  pieces.forEach(p => {
    const el = document.getElementById(p.id);
    if (!el) return;
    // Don't override if piece is mid-breakout CSS transition
    if (el.dataset.breaking === '1') return;

    const { tx, ty, rot } = idleTransform(p, t);
    const state = breakoutState[p.id];
    if (state && state.active) return; // CSS is handling it

    el.style.transform = `translate(${tx.toFixed(3)}px, ${ty.toFixed(3)}px) rotate(${rot.toFixed(3)}deg)`;
  });

  requestAnimationFrame(idleLoop);
}

function startIdle() {
  idleRunning = true;
  window._idleStart = null;
  requestAnimationFrame(idleLoop);

  // Stagger breakout starts so they don't all fire at once
  breakoutDefs.forEach((def, i) => {
    setTimeout(() => scheduleBreakout(def), i * 420 + rand(600, 1800));
  });
}

// ─── Boot ──────────────────────────────────────────────────────────────────
introSeq.forEach(([id]) => {
  const el = document.getElementById(id);
  if (el) { el.style.opacity='0'; el.style.transform='translateY(0px)'; el.dataset.breaking='0'; }
});

let timers = [];
setTimeout(() => {
  introSeq.forEach(([id, delay, dropY]) => {
    timers.push(setTimeout(() => introIn(id, dropY), delay));
  });

  const lastDelay = introSeq[introSeq.length-1][1] + 700;
  timers.push(setTimeout(() => {
    introSeq.forEach(([id]) => {
      const el = document.getElementById(id);
      if (el) el.style.transition = '';
    });
    setTimeout(startIdle, 50);
  }, lastDelay));
}, 300);
</script>
</body>
</html>
